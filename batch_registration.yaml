pipeline:
  type: chain
  transforms:
    - type: Create
      config:
        elements: [
          "gs://zero-copy-parquet-dir/*.parquet",
        ]
    - type: Reshuffle
    - type: PyTransform
      config:
        constructor: __callable__
        kwargs:
          source: |
            def match_files(pcoll):
              from apache_beam.io.fileio import MatchAll
              return pcoll | beam.Map(lambda row: row.element) | MatchAll()
    - type: MapToFields
      config:
        language: python
        fields:
          path:
            callable: "lambda row: row.path"
            output_type: string
    - type: LogForTesting
    - type: IcebergAddFiles
      config:
        table: "my_db.dest_batch_table"
        catalog_properties:
          type: "rest"
          uri: "https://biglake.googleapis.com/iceberg/v1/restcatalog"
          warehouse: "gs://zero-copy-warehouse"
          header.x-goog-user-project: "apache-beam-testing"
          rest.auth.type: "google"
          io-impl: "org.apache.iceberg.gcp.gcs.GCSFileIO"
          rest-metrics-reporting-enabled: "false"
        error_handling:
          output: errors
    - type: LogForTesting
      input: IcebergAddFiles.errors

providers:
  - type: python
    config: {}
    transforms:
      MatchContinuously: 'apache_beam.io.fileio.MatchContinuously'
